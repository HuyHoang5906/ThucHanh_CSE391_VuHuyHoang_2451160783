<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sinh viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Quản lý sinh viên</h1>
        
        <div class="top-bar">
            <div>
                <p>Tổng số sinh viên: <strong id="totalStudents">0</strong></p>
                <p>Điểm trung bình lớp: <strong id="averageScore">0.0</strong></p>
            </div>
            <button id="btnOpenAddForm">Thêm sinh viên</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Mã SV</th>
                    <th>Họ và tên</th>
                    <th>Ngày sinh</th>
                    <th>Lớp học</th>
                    <th>Điểm TB</th>
                    <th>Email</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                </tbody>
        </table>
    </div>

    <div id="studentModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Thêm sinh viên mới</h2>
            <form id="studentForm">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="form-group">
                    <label>Mã sinh viên:</label>
                    <input type="text" id="studentId" required>
                </div>
                <div class="form-group">
                    <label>Họ và tên:</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Ngày sinh:</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label>Lớp học:</label>
                    <input type="text" id="className" required>
                </div>
                <div class="form-group">
                    <label>Điểm trung bình:</label>
                    <input type="number" id="gpa" step="0.1" min="0" max="10" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="modal-actions">
                    <button type="submit" id="btnSubmit">Lưu dữ liệu</button>
                    <button type="button" id="btnCloseForm">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Công Việc Cá Nhân</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Quản Lý Công Việc Cá Nhân</h1>

        <button id="btnAdd" class="btn-add">
            + Thêm Công Việc
        </button>

        <div class="stats">
            <div class="stat-box">
                <h3>Tổng cộng</h3>
                <p id="totalTask">0</p>
            </div>

            <div class="stat-box">
                <h3>Đã hoàn thành</h3>
                <p id="completedTask">0</p>
            </div>

            <div class="stat-box">
                <h3>Chưa hoàn thành</h3>
                <p id="pendingTask">0</p>
            </div>
        </div>

        <div id="message"></div>

        <div id="taskList" class="task-list">
            <!-- Render bằng JS -->
        </div>

    </div>

    <!-- Popup -->

    <div id="popup" class="popup">

        <div class="popup-content">

            <span id="btnClose" class="close">&times;</span>

            <h2 id="formTitle">Thêm Công Việc</h2>

            <form id="taskForm">

                <input
                    type="text"
                    id="title"
                    placeholder="Tiêu đề công việc"
                    required
                >

                <textarea
                    id="description"
                    placeholder="Mô tả ngắn"
                    required
                ></textarea>

                <input
                    type="date"
                    id="deadline"
                    required
                >

                <select id="priority">

                    <option value="Thấp">
                        Thấp
                    </option>

                    <option value="Trung bình">
                        Trung bình
                    </option>

                    <option value="Cao">
                        Cao
                    </option>

                </select>

                <button type="submit">
                    Lưu
                </button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
